name: "Ansible Tags"
type: skill
category: ansible
difficulty: easy
tags: [ansible, tags, selective-execution]
time_estimate: "15m"
xp_reward: 100
packages: [ansible]
pre_install: []
namespace: ""
files:
  - source: files/setup.sh
    dest: ~/setup.sh
    executable: true
    cleanup: true
  - source: files/playbook.yml
    dest: ~/ansible-project/playbook.yml
  - source: files/inventory.ini
    dest: ~/ansible-project/inventory.ini
setup:
  - bash ~/setup.sh
instructions: |
  ## Use Ansible Tags

  Tags let you run specific parts of a playbook. A playbook in `~/ansible-project/playbook.yml` needs tags added to its tasks.

  ### Your task

  1. Navigate to `~/ansible-project/`
  2. Add tags to the tasks in the playbook:
     - Tasks creating directories should have the tag `setup`
     - Tasks creating config files should have the tag `config`
     - All tasks should also have the tag `all`
  3. Run only the `setup` tagged tasks, then run all tasks
  4. The full playbook must run successfully

  ### Tag syntax

  ```yaml
  - name: My task
    file:
      path: /tmp/test
      state: directory
    tags:
      - setup
      - all
  ```

  ### Useful commands

  ```bash
  cd ~/ansible-project
  ansible-playbook -i inventory.ini playbook.yml --list-tags
  ansible-playbook -i inventory.ini playbook.yml --tags setup
  ansible-playbook -i inventory.ini playbook.yml
  ```
hints:
  - "Add `tags:` as a list under each task"
  - "A task can have multiple tags: `tags: [setup, all]`"
  - "Use `--list-tags` to verify your tags are recognized"
validation:
  script: validate.sh
  success_message: "Tags are configured correctly!"
  failure_message: "Tag configuration incomplete. Make sure all tasks have the required tags."
