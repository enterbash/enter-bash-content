name: "Create a Multi-Container Pod"
type: skill
category: kubernetes
difficulty: medium
tags: [kubernetes, pods, multi-container, sidecar]
time_estimate: "20m"
xp_reward: 150
packages: []
pre_install: [kubectl]
namespace: ""
files:
  - source: files/setup.sh
    dest: ~/setup.sh
    executable: true
    cleanup: true
setup:
  - bash ~/setup.sh
instructions: |
  ## Create a Multi-Container Pod

  Create a Pod with multiple containers that share a volume.

  ### Requirements

  - File: `~/pod.yaml`
  - Pod name: `multi-container`
  - Container 1 (main app):
    - Name: `web`
    - Image: `nginx:1.25`
    - Mount shared volume at `/usr/share/nginx/html`
  - Container 2 (content generator):
    - Name: `content`
    - Image: `busybox:1.36`
    - Command: `["sh", "-c", "while true; do date > /html/index.html; sleep 10; done"]`
    - Mount shared volume at `/html`
  - Shared volume: emptyDir named `shared-data`

  ### Your task

  1. Create `~/pod.yaml` with both containers sharing a volume
  2. It must pass `kubectl apply --dry-run=client -f ~/pod.yaml`

  ### Useful commands

  ```bash
  kubectl apply --dry-run=client -f ~/pod.yaml
  ```
hints:
  - "Both containers go in the same spec.containers array"
  - "Both containers must reference the same volume name in their volumeMounts"
  - "The volume is defined once in spec.volumes"
validation:
  script: validate.sh
  success_message: "Multi-container pod is correctly configured!"
  failure_message: "The multi-container pod manifest has errors."
