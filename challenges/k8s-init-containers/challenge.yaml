name: "Add Init Containers"
type: skill
category: kubernetes
difficulty: medium
tags: [kubernetes, init-containers, pods, startup]
time_estimate: "20m"
xp_reward: 150
packages: []
pre_install: [kubectl]
namespace: ""
files:
  - source: files/setup.sh
    dest: ~/setup.sh
    executable: true
    cleanup: true
setup:
  - bash ~/setup.sh
instructions: |
  ## Add Init Containers

  A Pod needs an init container that prepares data before the main container starts.

  ### What you know

  - The manifest is at `~/pod.yaml`
  - The main container serves files from `/usr/share/nginx/html`
  - An emptyDir volume `html` is already configured

  ### Requirements

  Add an init container with:
  - Name: `content-init`
  - Image: `busybox:1.36`
  - Command: `["sh", "-c", "echo '<h1>Hello from init container</h1>' > /work-dir/index.html"]`
  - Mount the `html` volume at `/work-dir`

  ### Your task

  1. Edit `~/pod.yaml` to add the init container
  2. The manifest must pass `kubectl apply --dry-run=client -f ~/pod.yaml`

  ### Useful commands

  ```bash
  kubectl apply --dry-run=client -f ~/pod.yaml
  ```
hints:
  - "Init containers go under spec.initContainers (same level as containers)"
  - "Init containers have the same schema as regular containers"
  - "The init container must mount the same volume to write data for the main container"
validation:
  script: validate.sh
  success_message: "Init container is correctly configured!"
  failure_message: "Init container is missing or incorrectly configured."
