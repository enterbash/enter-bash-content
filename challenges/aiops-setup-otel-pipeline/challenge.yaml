name: "Set Up an OpenTelemetry Pipeline"
type: skill
category: aiops
difficulty: medium
tags: [opentelemetry, otel, collector, observability, telemetry]
time_estimate: "20m"
xp_reward: 150
packages: []
pre_install: [otelcol-contrib]
namespace: ""
files:
  - source: files/setup.sh
    dest: ~/setup.sh
    executable: true
    cleanup: true
  - source: files/generate_telemetry.py
    dest: ~/generate_telemetry.py
setup:
  - bash ~/setup.sh
instructions: |
  ## Set Up an OpenTelemetry Pipeline

  OpenTelemetry (OTel) is the CNCF standard for collecting metrics, logs, and traces.
  The OTel Collector receives, processes, and exports telemetry data through a pipeline
  architecture: receivers -> processors -> exporters.

  ### Your Tasks

  1. **Create an OTel Collector config** at `~/otel-config.yaml` with:

     - **Receivers**:
       - `otlp` â€” listening on gRPC port `4317` and HTTP port `4318`

     - **Processors**:
       - `batch` â€” with `timeout: 5s` and `send_batch_size: 100`

     - **Exporters**:
       - `logging` â€” with `verbosity: detailed`
       - `prometheus` â€” exposing metrics on port `8889` at endpoint `0.0.0.0:8889`

     - **Service pipelines**:
       - `metrics` pipeline: receivers `[otlp]`, processors `[batch]`, exporters `[prometheus, logging]`
       - `traces` pipeline: receivers `[otlp]`, processors `[batch]`, exporters `[logging]`

  2. **Start the OTel Collector**:
     ```
     otelcol-contrib --config ~/otel-config.yaml > ~/otel.log 2>&1 &
     ```

  3. **Send test telemetry** using the provided script:
     ```
     python3 ~/generate_telemetry.py
     ```

  4. **Verify** the pipeline is working:
     - Check the collector is running: `curl -s http://localhost:13133/`
     - Check exported metrics: `curl -s http://localhost:8889/metrics | head -20`

  ### OTel Config Structure
  ```yaml
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch:
      timeout: 5s
  exporters:
    logging:
      verbosity: detailed
  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [logging]
  ```

  ### Useful Commands
  - Validate config: `otelcol-contrib validate --config ~/otel-config.yaml`
  - Check collector health: `curl -s http://localhost:13133/`
  - View Prometheus metrics: `curl -s http://localhost:8889/metrics | grep -v '^#' | head`

hints:
  - "The config has four top-level sections: `receivers`, `processors`, `exporters`, and `service`. The `service.pipelines` section wires them together."
  - "For the prometheus exporter, use: `prometheus: {endpoint: '0.0.0.0:8889'}`. This exposes collected metrics in Prometheus format."
  - "Make sure both gRPC (4317) and HTTP (4318) protocols are configured under `receivers.otlp.protocols`."
validation:
  script: validate.sh
  success_message: "Your OpenTelemetry pipeline is running and processing telemetry!"
  failure_message: "Check your otel-config.yaml syntax and ensure the collector is running. Use `otelcol-contrib validate` to check."
