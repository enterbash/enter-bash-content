name: "Build a Grafana Dashboard"
type: skill
category: aiops
difficulty: easy
tags: [grafana, dashboard, prometheus, visualization, observability]
time_estimate: "20m"
xp_reward: 100
packages: []
pre_install: [prometheus, prometheus-node-exporter, grafana]
namespace: ""
web_port: 3000
files:
  - source: files/setup.sh
    dest: ~/setup.sh
    executable: true
    cleanup: true
setup:
  - bash ~/setup.sh
instructions: |
  ## Build a Grafana Dashboard

  Grafana dashboards turn raw metrics into actionable visualizations. In this challenge,
  you'll create a system monitoring dashboard with panels for CPU, memory, disk, and network.

  ### Pre-configured

  Prometheus and node_exporter are already running and scraping metrics. Grafana is running
  on port 3000 (use the Browser tab to access it). A Prometheus data source is pre-configured.

  - Grafana login: `admin` / `admin`

  ### Your Tasks

  1. **Create a dashboard JSON file** at `~/dashboard.json` with four panels:

     - **CPU Usage** â€” PromQL: `100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)`
     - **Memory Usage** â€” PromQL: `(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100`
     - **Disk Usage** â€” PromQL: `(1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100`
     - **Network Received** â€” PromQL: `rate(node_network_receive_bytes_total{device!="lo"}[5m])`

  2. **Import the dashboard** into Grafana using the API:
     ```
     curl -s -X POST http://admin:admin@localhost:3000/api/dashboards/db \
       -H 'Content-Type: application/json' \
       -d "{\"dashboard\": $(cat ~/dashboard.json), \"overwrite\": true}"
     ```

  3. **Verify** the dashboard was imported:
     ```
     curl -s http://admin:admin@localhost:3000/api/search?type=dash-db | jq '.[].title'
     ```

  ### Dashboard JSON Structure

  Your `~/dashboard.json` needs at minimum:
  ```json
  {
    "title": "System Monitoring",
    "panels": [
      {
        "title": "CPU Usage",
        "type": "timeseries",
        "targets": [{"expr": "YOUR_PROMQL_HERE", "refId": "A"}],
        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
      }
    ]
  }
  ```

  ### Useful Commands
  - List dashboards: `curl -s http://admin:admin@localhost:3000/api/search | jq .`
  - Check Prometheus targets: `curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets[].health'`

hints:
  - "Each panel needs `title`, `type` (use `timeseries`), `targets` array with `expr` (the PromQL) and `refId`, and `gridPos` for layout."
  - "Use `gridPos` to arrange panels in a 2x2 grid: (x:0,y:0), (x:12,y:0), (x:0,y:8), (x:12,y:8) with h:8, w:12 each."
  - "Make sure the dashboard JSON has `\"title\": \"System Monitoring\"` at the top level. The import API wraps it in `{\"dashboard\": ..., \"overwrite\": true}`."
validation:
  script: validate.sh
  success_message: "Your Grafana dashboard is live with all four monitoring panels!"
  failure_message: "Check that ~/dashboard.json exists with 4 panels and was imported into Grafana successfully."
